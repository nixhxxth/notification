<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Form</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
  rel="icon"
  type="image/x-icon"
  href="https://notify-blk.netlify.app/assets/blk.ico"
>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-8">

<h1 class="text-2xl font-bold text-center mb-2">
    Contact Us
</h1>

<p class="text-gray-500 text-center mb-6">
    Submit your enquiry
</p>

<form id="contactForm" class="space-y-4">

    <input
        id="name"
        type="text"
        placeholder="Full Name"
        required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring focus:ring-slate-300"
    >

    <input
        id="email"
        type="email"
        placeholder="Email Address"
        required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring focus:ring-slate-300"
    >

    <input
        id="phone"
        type="tel"
        placeholder="+919876543210"
        required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring focus:ring-slate-300"
    >

    <input
        id="subject"
        type="text"
        placeholder="Subject"
        required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring focus:ring-slate-300"
    >

    <textarea
        id="message"
        rows="5"
        placeholder="Message"
        required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring focus:ring-slate-300"
    ></textarea>

    <button
        id="submitBtn"
        type="submit"
        class="w-full bg-black text-white rounded-lg py-3 font-medium hover:opacity-90 transition"
    >
        Submit
    </button>

</form>

<div
    id="result"
    class="hidden mt-6 p-4 rounded-lg"
></div>

<p class="mt-6 text-center text-sm text-gray-500">

    <a
        href="mailto:nishanth@nixhxxth.fun"
        class="inline-flex items-center gap-2 font-medium hover:underline"
    >
        <img
            src="./assets/blk.png"
            alt="BLK"
            class="h-5 w-5"
        >
        NP / BLK



    </a>

</p>
<p class="mt-6 text-center text-sm text-gray-500">
    <a
        href="https://blk2np.qzz.io"
        class="inline-flex items-center gap-2 font-medium hover:underline"
    >

        blk2np.qzz.io

    </a>
</p>
</div>

<script>

document
.getElementById("contactForm")
.addEventListener(
"submit",
async (e) => {

    e.preventDefault();

    const btn =
      document.getElementById(
        "submitBtn"
      );

    const result =
      document.getElementById(
        "result"
      );

    btn.disabled = true;

    btn.innerText =
      "Submitting...";

    result.classList.add(
      "hidden"
    );

    const payload = {

        name:
          document.getElementById("name").value.trim(),

        email:
          document.getElementById("email").value.trim(),

        phone:
          document.getElementById("phone").value.trim(),

        subject:
          document.getElementById("subject").value.trim(),

        message:
          document.getElementById("message").value.trim(),

        createdAt:
          new Date().toISOString()

    };

    try {

        const response =

          await fetch(

            "/.netlify/functions/send-acknowledgement",

            {

              method: "POST",

              headers: {

                "Content-Type":
                  "application/json"

              },

              body:
                JSON.stringify(payload)

            }

          );

        const data =
          await response.json();

        if (!response.ok) {

          throw new Error(
            data.error ||
            "Request failed"
          );

        }

        result.classList.remove(
          "hidden"
        );

        result.className =
          "mt-6 p-4 rounded-lg bg-green-100 text-green-800";

        result.innerHTML =

          `
          <strong>Request Submitted Successfully</strong>
          <br>
          Ticket ID:
          ${data.ticketId || "Generated"}
          `;

        document
          .getElementById(
            "contactForm"
          )
          .reset();

    }

    catch(err) {

        result.classList.remove(
          "hidden"
        );

        result.className =
          "mt-6 p-4 rounded-lg bg-red-100 text-red-800";

        result.innerHTML =

          `
          <strong>Submission Failed</strong>
          <br>
          ${err.message}
          `;

    }

    finally {

        btn.disabled = false;

        btn.innerText =
          "Submit";

    }

});

</script>

</body>

</html>
